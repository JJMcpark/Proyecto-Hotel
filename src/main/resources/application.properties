spring.application.name=hotel
server.port=8091
server.forward-headers-strategy=framework
spring.web.error.include-stacktrace=never
spring.web.error.include-message=always

# Configuración de JPA y Hibernate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=off

# Configuración de Flyway para la base de datos
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-description="Migración inicial - Hotel"
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

#CONFIGURACIÓN DE SEGURIDAD PARA JWT
##Duración de expiración de tokens en milisegundos
##Access token: 24 minutos (1440000 ms)
application.security.jwt.access-token-expiration=1440000
##Refresh token: 7 días (604800000 ms) 
application.security.jwt.refresh-token-expiration=604800000
##Confirmation token: 15 minutos (900000 ms)
application.security.jwt.confirmation-token-expiration=900000 

# Configuración de la base de datos MySQL
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/hoteldatabase?createDatabaseIfNotExist=true

#Configuraciones de desarrollo seteadas con variables de entorno
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.flyway.user=${DB_FLYWAY_USERNAME}
spring.flyway.password=${DB_FLYWAY_PASSWORD}
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}
application.cookie.secure=${COOKIE_SECURE:false}
